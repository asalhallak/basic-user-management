<div class="card">
    <h4 class="card-header">Login</h4>
    <div class="card-body">
        <form *ngIf="form" [formGroup]="form" (ngSubmit)="onSubmit()" [attr.aria-busy]="loading ? 'true' : null">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" formControlName="username" class="form-control"
                       autocomplete="username"
                       [ngClass]="{ 'is-invalid': submitted && controls.username.errors }" />
                <div *ngIf="submitted && controls.username.errors" class="invalid-feedback">
                    <div *ngIf="controls.username.errors.required">Username is required</div>
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" formControlName="password" class="form-control"
                       autocomplete="current-password"
                       [ngClass]="{ 'is-invalid': submitted && controls.password.errors }" />
                <div *ngIf="submitted && controls.password.errors" class="invalid-feedback">
                    <div *ngIf="controls.password.errors.required">Password is required</div>
                </div>
            </div>
            <div class="form-group">
                <button type="submit" [disabled]="loading" class="btn btn-primary" [attr.aria-label]="loading ? 'Signing in' : null">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm mr-1" aria-hidden="true"></span>
                    Login
                </button>
                <a routerLink="../register" class="btn btn-link" aria-label="Go to register page">Register</a>
            </div>
        </form>
    </div>
</div>
